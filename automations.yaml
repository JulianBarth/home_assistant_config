# Using 15-minute pricing intervals from Tibber API
- alias: "Manual Battery Charging"
  trigger:
    - platform: state
      entity_id: input_boolean.manual_battery_charge
      to: "on"
  action:
    # Just set the flag - let unified coordinator handle the rest
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "🔋 Manual Charging Requested"
        message: >-
          Charging to {{ states('input_number.manual_charge_target_soc') | float(80) | round(0) }}%
          (now {{ states('sensor.batterie_soc') }}%) at
          {{ (states('sensor.tibber_cached_energy_prices') | float(0) * 100) | round(1) }} ct/kWh.
          Automation is overridden until the target is reached.
        data:
          tag: battery_charging
          group: battery

- alias: "Unified Battery Control Coordinator"
  description: "Single automation to coordinate all battery control modes"
  trigger:
    # Trigger on mode changes
    - platform: state
      entity_id: sensor.battery_control_mode
    # Trigger on SoC changes (for stop conditions and hold mode)
    - platform: state
      entity_id:
        - binary_sensor.should_stop_charging
        - binary_sensor.should_hold_battery_soc
        - binary_sensor.should_prevent_discharge
        - sensor.computed_target_soc
    # Fallback check every 5 minutes
    - platform: time_pattern
      minutes: "/5"
  action:
    - choose:
        # Mode 1: Manual Charging (Highest Priority)
        - conditions:
            - condition: state
              entity_id: sensor.battery_control_mode
              state: "manual_charging"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.battery_target_soc
              data:
                value: "{{ states('input_number.manual_charge_target_soc') | float(default=80) }}"
            - service: script.turn_on
              target:
                entity_id: script.forced_full_recharge
            - service: switch.turn_on
              target:
                entity_id: switch.StorCtl_Mod
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.battery_charging_active

        # Mode 2: Car + Battery Charging
        - conditions:
            - condition: state
              entity_id: sensor.battery_control_mode
              state: "car_and_battery_charging"
            - condition: state
              entity_id: binary_sensor.should_stop_charging
              state: "off"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.battery_target_soc
              data:
                value: "{{ states('sensor.computed_target_soc') | float(default=15) }}"
            - service: script.turn_on
              target:
                entity_id: script.charge_battery_limit_discharge

        # Mode 3: Car Charging Only (Limit Discharge)
        - conditions:
            - condition: state
              entity_id: sensor.battery_control_mode
              state: "car_charging_only"
          sequence:
            # House from battery, Car from grid.
            # Limit discharge to exactly match house consumption.
            - service: script.turn_on
              target:
                entity_id: script.set_dynamic_discharge_limit
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.battery_no_discharging_active

        # Mode 4: Battery Charging Only
        - conditions:
            - condition: state
              entity_id: sensor.battery_control_mode
              state: "battery_charging"
            - condition: state
              entity_id: binary_sensor.should_stop_charging
              state: "off"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.battery_target_soc
              data:
                value: "{{ states('sensor.computed_target_soc') | float(default=15) }}"
            - service: script.turn_on
              target:
                entity_id: script.forced_full_recharge
            - service: switch.turn_on
              target:
                entity_id: switch.StorCtl_Mod
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.battery_charging_active

      # Default: Stop Charging, Hold SOC, or Normal Operation
      # NOTE: Fronius handles minimum reserve SoC — HA only manages cost optimization
      default:
        - choose:
            # FIRST: Stop charging when target reached
            - conditions:
                - condition: state
                  entity_id: binary_sensor.should_stop_charging
                  state: "on"
              sequence:
                - service: script.turn_on
                  target:
                    entity_id: script.stop_battery_charging
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.manual_battery_charge
                # Clear ALL flags — charging cycle complete
                - service: input_boolean.turn_off
                  target:
                    entity_id:
                      - input_boolean.battery_charging_active
                      - input_boolean.battery_no_discharging_active
                # Reset target to default (prevents stale 100% target from previous cycle)
                - service: input_number.set_value
                  target:
                    entity_id: input_number.battery_target_soc
                  data:
                    value: "{{ states('input_number.soc_target_default') | float(default=15) }}"
            # SECOND: Hold SOC when approaching target during active charging
            - conditions:
                - condition: state
                  entity_id: binary_sensor.should_hold_battery_soc
                  state: "on"
              sequence:
                # Use reduced charge rate (50%) to approach target gradually
                - service: script.turn_on
                  target:
                    entity_id: script.charge_battery_reduced_rate
                # Set flag to indicate we're in hold/limited discharge mode
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.battery_no_discharging_active
            # THIRD: Prevent discharge when at or below target SoC
            - conditions:
                - condition: state
                  entity_id: binary_sensor.should_prevent_discharge
                  state: "on"
              sequence:
                # Limit discharge to 1% to hold SOC, allow solar charging
                - service: script.turn_on
                  target:
                    entity_id: script.hold_battery_soc
                # Set flag to indicate we're in hold/limited discharge mode
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.battery_no_discharging_active
          # Fully release — no car, no charging needed
          default:
            - service: script.turn_on
              target:
                entity_id: script.set_regular_charge
            - service: switch.turn_off
              target:
                entity_id: switch.StorCtl_Mod
            - service: input_boolean.turn_off
              target:
                entity_id:
                  - input_boolean.battery_charging_active
                  - input_boolean.battery_no_discharging_active
            # Reset target to default
            - service: input_number.set_value
              target:
                entity_id: input_number.battery_target_soc
              data:
                value: "{{ states('input_number.soc_target_default') | float(default=15) }}"


# =============================================================================
# ALGORITHM STATE LOGGER
# Writes a JSON line to /config/battery_algorithm.log every 15 min and on events
# =============================================================================
- alias: "Battery Algorithm State Logger"
  description: "Logs full algorithm state as JSON for offline analysis"
  trigger:
    # Periodic: every 15 minutes
    - platform: time_pattern
      minutes: "/15"
      id: periodic
    # Event-based triggers
    - platform: state
      entity_id: input_boolean.battery_charging_active
      id: charging_flag_changed
    - platform: state
      entity_id: input_boolean.battery_no_discharging_active
      id: discharge_flag_changed
    - platform: state
      entity_id: binary_sensor.should_start_charging
      to: "on"
      id: should_start
    - platform: state
      entity_id: binary_sensor.should_stop_charging
      to: "on"
      id: should_stop
    - platform: state
      entity_id: sensor.battery_control_mode
      id: mode_changed
  action:
    - service: notify.battery_log
      data:
        message: >
          {% set data = state_attr('sensor.battery_optimization_data', 'calculation_data') %}
          {% set cached_today = state_attr('sensor.tibber_cached_energy_prices', 'today') or [] %}
          {% set cached_tomorrow = state_attr('sensor.tibber_cached_energy_prices', 'tomorrow') or [] %}
          {% set raw_today = state_attr('sensor.tibber_energy_prices', 'today') or [] %}
          {% set raw_tomorrow = state_attr('sensor.tibber_energy_prices', 'tomorrow') or [] %}
          {"ts":"{{ now().isoformat() }}","trigger":"{{ trigger.id | default('unknown') }}","soc":{{ states('sensor.batterie_soc') | float(0) }},"soc_scaled":{{ states('sensor.reading_energy_battery_soc_scaled') | float(0) }},"target":{{ states('input_number.battery_target_soc') | float(15) }},"computed_target":{{ states('sensor.computed_target_soc') | float(15) }},"mode":"{{ states('sensor.battery_control_mode') }}","charging_state":"{{ states('sensor.charging_state') }}","bridge_type":"{{ data.bridge_type if data else 'N/A' }}","bridge_hours":{{ data.bridge_hours if data else 0 }},"bridge_consumption_wh":{{ data.bridge_consumption_wh if data else 0 }},"energy_deficit_wh":{{ data.energy_deficit_wh if data else 0 }},"solar_remaining_wh":{{ data.expected_solar_wh if data else 0 }},"usable_solar_wh":{{ data.usable_solar_wh if data else 0 }},"sunrise_hour":{{ data.sunrise_hour if data else 0 }},"solar_start":{{ data.solar_start if data else 0 }},"max_grid_target":{{ data.max_grid_target if data else 100 }},"is_low_solar":{{ data.is_low_solar_day | lower if data else 'true' }},"price_ct":{{ (states('sensor.tibber_cached_energy_prices') | float(999) * 100) | round(2) }},"next_price_ct":{{ data.next_price_cents if data else 0 }},"price_drop_ct":{{ data.price_drop_cents if data else 0 }},"percentile":{{ states('sensor.tibber_energy_price_percentile_next_12_hours') | float(100) }},"wear_cost_ct":{{ states('input_number.battery_wear_cost_per_kwh') | float(2) }},"decision":"{{ data.decision_reason if data else 'N/A' }}","flags":{"charging":{{ is_state('input_boolean.battery_charging_active','on') | lower }},"no_discharge":{{ is_state('input_boolean.battery_no_discharging_active','on') | lower }},"automation":{{ is_state('input_boolean.battery_automation_on','on') | lower }},"manual":{{ is_state('input_boolean.manual_battery_charge','on') | lower }}},"sensors":{"start":{{ is_state('binary_sensor.should_start_charging','on') | lower }},"stop":{{ is_state('binary_sensor.should_stop_charging','on') | lower }},"hold":{{ is_state('binary_sensor.should_hold_battery_soc','on') | lower }},"profitable":{{ is_state('binary_sensor.battery_charging_is_profitable_enhanced','on') | lower }},"car":{{ is_state('binary_sensor.car_charging_stable','on') | lower }},"price_data_valid":{{ is_state('binary_sensor.tibber_cached_price_data_valid','on') | lower }}},"inverter":{"battery_w":{{ states('sensor.battery_power') | float(0) | round(0) }},"ac_w":{{ states('sensor.reading_energy_inverter_ac_output') | float(0) | round(0) }},"grid_w":{{ states('sensor.reading_energy_main_meter') | float(0) | round(0) }},"storctl":"{{ states('switch.storctl_mod') }}"},"car":{"wallbox_w":{{ states('sensor.wattpilot_charging_power') | float(0) | round(0) }},"house_w":{{ states('sensor.house_consumption') | float(0) | round(0) }},"discharge_limit_pct":{{ states('sensor.discharge_limit_percentage') | float(100) }}},"prices":{"today":{{ cached_today | length }},"tomorrow":{{ cached_tomorrow | length }},"raw_today":{{ raw_today | length }},"raw_tomorrow":{{ raw_tomorrow | length }},"cache_status":"{{ state_attr('sensor.tibber_cached_energy_prices', 'cache_status') }}","hours_remaining":{{ state_attr('sensor.tibber_cached_energy_prices', 'hours_remaining') | float(0) }}}}
  mode: queued
  max: 5


# Reset battery target SoC on HA startup to prevent stale values after crashes
- alias: "Reset Battery Target on Startup"
  description: "Resets battery_target_soc to default on HA restart"
  trigger:
    - platform: homeassistant
      event: start
  action:
    - delay:
        seconds: 30
    - service: input_number.set_value
      target:
        entity_id: input_number.battery_target_soc
      data:
        value: "{{ states('input_number.soc_target_default') | float(default=15) }}"
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.battery_charging_active
          - input_boolean.battery_no_discharging_active
          - input_boolean.manual_battery_charge
    - service: switch.turn_off
      target:
        entity_id: switch.StorCtl_Mod
    - service: script.turn_on
      target:
        entity_id: script.set_regular_charge

- alias: Solcast update
  description: ""
  trigger:
    - platform: state
      entity_id: binary_sensor.solcast_update_due
      to: "on"
  condition:
    - condition: sun
      before: sunset
      after: sunrise
  action:
    - delay:
        seconds: "{{ range(30, 360)|random|int }}"
    - service: solcast_solar.update_forecasts
      data: {}
  mode: single

# =============================================================================
# SMARTPHONE NOTIFICATIONS
# Conventions: every alert has a `tag` (updates replace instead of stack) and
# `group: battery` (collapsed into one thread). Resolvable alerts send
# `clear_notification` with the same tag when the condition clears.
# =============================================================================
- alias: "Notify when Battery Charging is Active"
  trigger:
    - platform: state
      entity_id: input_boolean.battery_charging_active
      to: "on"
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "🔋 Battery Charging Started"
        message: >-
          {{ states('sensor.batterie_soc') }}% → {{ states('input_number.battery_target_soc') | float(15) | round(0) }}%
          at {{ (states('sensor.tibber_cached_energy_prices') | float(0) * 100) | round(1) }} ct/kWh
          (percentile {{ states('sensor.tibber_energy_price_percentile_next_12_hours') | float(0) | round(0) }}%).
          Reason: {{ state_attr('sensor.battery_optimization_data', 'calculation_data').decision_reason
                     if state_attr('sensor.battery_optimization_data', 'calculation_data') else 'n/a' }}
        data:
          tag: battery_charging
          group: battery
          actions:
            - action: "BATTERY_STOP_CHARGING"
              title: "Stop & pause automation"

- alias: "Notify when Battery Charging Finished"
  trigger:
    - platform: state
      entity_id: input_boolean.battery_charging_active
      from: "on"
      to: "off"
  action:
    # Same tag — replaces the "charging started" notification
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "🔋 Battery Charging Finished"
        message: >-
          Stopped at {{ states('sensor.batterie_soc') }}%.
          Current price {{ (states('sensor.tibber_cached_energy_prices') | float(0) * 100) | round(1) }} ct/kWh.
        data:
          tag: battery_charging
          group: battery

- alias: "Notify when No Battery Discharging is Active"
  trigger:
    # Debounce: short flaps (car-charging detection settling) don't notify
    - platform: state
      entity_id: input_boolean.battery_no_discharging_active
      to: "on"
      for:
        minutes: 2
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "🔒 Battery Discharge Limited"
        message: >-
          {{ states('sensor.battery_control_status') }} —
          SoC {{ states('sensor.batterie_soc') }}%,
          discharge limit {{ states('sensor.discharge_limit_percentage') | float(100) | round(0) }}%
          {%- if is_state('binary_sensor.car_charging_stable', 'on') %},
          wallbox {{ states('sensor.wattpilot_charging_power') | float(0) | round(0) }} W{% endif %}.
        data:
          tag: battery_discharge_limit
          group: battery

- alias: "Clear Discharge Limit Notification"
  trigger:
    - platform: state
      entity_id: input_boolean.battery_no_discharging_active
      from: "on"
      to: "off"
      for:
        minutes: 2
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        message: clear_notification
        data:
          tag: battery_discharge_limit

- alias: "Notify when Battery SoC is below 7.5%"
  trigger:
    - platform: numeric_state
      entity_id: sensor.reading_energy_battery_soc_scaled
      below: 750  # scaled SoC: 750 = 7.5%
      for:
        minutes: 5
  condition:
    # Don't alarm on Modbus glitches reading SoC as 0/unavailable
    - condition: state
      entity_id: binary_sensor.inverter_data_valid
      state: "on"
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "🪫 Battery Critically Low"
        message: >-
          Battery SoC is {{ states('sensor.batterie_soc') }}% — below the 7.5% reserve.
          Mode: {{ states('sensor.battery_control_mode') }},
          state: {{ states('sensor.charging_state') }}.
        data:
          tag: battery_soc_low
          group: battery
          # Android: deliver immediately
          ttl: 0
          priority: high
          # iOS: critical alert (breaks through silent mode)
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8

- alias: "Handle Battery Notification Actions"
  description: "Action buttons on battery notifications"
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: BATTERY_STOP_CHARGING
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: BATTERY_RESUME_AUTOMATION
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'BATTERY_STOP_CHARGING' }}"
          sequence:
            # Pause automation FIRST so the coordinator can't restart the charge
            - service: input_boolean.turn_off
              target:
                entity_id:
                  - input_boolean.battery_automation_on
                  - input_boolean.manual_battery_charge
            - service: script.turn_on
              target:
                entity_id: script.stop_battery_charging
            - service: notify.mobile_app_f4gdn4ry0gpq_2
              data:
                title: "⏸️ Charging Stopped, Automation Paused"
                message: >-
                  Battery automation is OFF until you resume it.
                  SoC: {{ states('sensor.batterie_soc') }}%.
                data:
                  tag: battery_charging
                  group: battery
                  actions:
                    - action: "BATTERY_RESUME_AUTOMATION"
                      title: "Resume automation"
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'BATTERY_RESUME_AUTOMATION' }}"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.battery_automation_on
            - service: notify.mobile_app_f4gdn4ry0gpq_2
              data:
                title: "▶️ Battery Automation Resumed"
                message: "Normal price-optimized operation is active again."
                data:
                  tag: battery_charging
                  group: battery

- alias: "Notify when Inverter Data is Invalid"
  description: "Alerts on Modbus/Fronius outages (SoC register unavailable or 0)"
  trigger:
    - platform: state
      entity_id: binary_sensor.inverter_data_valid
      to: "off"
      for:
        minutes: 10
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "⚠️ Inverter Data Invalid"
        message: >-
          No valid Fronius/Modbus data for 10 minutes
          (SoC register: {{ states('sensor.reading_energy_battery_soc_scaled') }}).
          Battery automation decisions are paused until data returns.
        data:
          tag: inverter_outage
          group: battery
          ttl: 0
          priority: high

- alias: "Notify when Inverter Data is Restored"
  trigger:
    - platform: state
      entity_id: binary_sensor.inverter_data_valid
      from: "off"
      to: "on"
      for:
        minutes: 2
  action:
    # Replace the outage alert with a short all-clear
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "✅ Inverter Data Restored"
        message: "Fronius data is valid again. SoC: {{ states('sensor.batterie_soc') }}%."
        data:
          tag: inverter_outage
          group: battery

- alias: "Notify when Price Data is Invalid"
  description: "Alerts when Tibber price data is stale and the cache has expired"
  trigger:
    - platform: state
      entity_id: binary_sensor.tibber_cached_price_data_valid
      to: "off"
      for:
        hours: 1
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "⚠️ Price Data Invalid"
        message: >-
          Tibber price data has been invalid for 1 hour
          (cache: {{ state_attr('sensor.tibber_cached_energy_prices', 'cache_status') }},
          {{ state_attr('sensor.tibber_cached_energy_prices', 'hours_remaining') | float(0) | round(1) }} h remaining).
          Battery runs on the default target.
        data:
          tag: price_data_outage
          group: battery

- alias: "Notify when Price Data is Restored"
  trigger:
    - platform: state
      entity_id: binary_sensor.tibber_cached_price_data_valid
      from: "off"
      to: "on"
      for:
        minutes: 5
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        message: clear_notification
        data:
          tag: price_data_outage

- alias: "Rotate Battery Algorithm Log"
  description: "Keeps battery_algorithm.log at most ~20000 lines (monthly)"
  trigger:
    - platform: time
      at: "03:00:00"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  action:
    - service: shell_command.rotate_battery_log

- alias: "Notify when Tibber Pulse is not functioning"
  trigger:
    - platform: state
      entity_id: binary_sensor.tibber_pulse_not_functioning
      to: "on"
      for:
        minutes: 5  # Wait 5 minutes to avoid false alarms from brief disconnections
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        title: "⚠️ Tibber Pulse Offline"
        message: "Tibber Pulse is not reporting. Check the sensor's power or connectivity."
        data:
          tag: tibber_pulse_outage
          group: battery

- alias: "Clear Tibber Pulse Notification"
  trigger:
    - platform: state
      entity_id: binary_sensor.tibber_pulse_not_functioning
      from: "on"
      to: "off"
      for:
        minutes: 5
  action:
    - service: notify.mobile_app_f4gdn4ry0gpq_2
      data:
        message: clear_notification
        data:
          tag: tibber_pulse_outage
