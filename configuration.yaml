# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Lovelace UI configuration
lovelace:
  resource_mode: yaml
  resources:
    - url: /hacsfiles/ha-sankey-chart/ha-sankey-chart.js
      type: module
    - url: /hacsfiles/power-flow-card-plus/power-flow-card-plus.js
      type: module
  dashboards:
    energy-overview:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Overview
      icon: mdi:view-dashboard
      show_in_sidebar: true

# Helper
# NOTE: no `initial:` on helpers — HA would reset them to that value on every
# restart, silently wiping UI-tuned parameters. Values now persist via restore.
input_boolean:
  battery_charging_active:
    name: Battery Charging Active
    icon: mdi:battery-charging
  battery_no_discharging_active:
    name: Battery No Discharging
    icon: mdi:battery-lock
  battery_automation_on:
    name: Battery Charge Automation is On
    icon: mdi:state-machine
  manual_battery_charge:
    name: Manual Battery Charge

input_number:
  battery_target_soc:
    name: Battery Target SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
  manual_charge_target_soc:
    name: Manual Charge Target SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"

  sun_threshold_low:
    name: Expected Sun Low Threshold
    min: 0
    max: 50000
    step: 1000
    unit_of_measurement: "Wh"

  sun_threshold_very_low:
    name: Expected Sun Very Low Threshold
    min: 0
    max: 50000
    step: 1000
    unit_of_measurement: "Wh"

  soc_target_default:
    name: Default Target SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"

  soc_hist:
    name: SoC Hysteresis
    step: 0.5
    min: 0
    max: 25
    icon: mdi:thermometer

  # Grid capacity setting
  grid_connection_capacity:
    name: Grid Connection Capacity
    min: 5000
    max: 50000
    step: 1000
    unit_of_measurement: "W"
    icon: mdi:transmission-tower

  # Battery parameters
  battery_charge_rate_max:
    name: Maximum Battery Charge Rate
    min: 1000
    max: 10000
    step: 500
    unit_of_measurement: "W"
    icon: mdi:lightning-bolt

  # Economic parameters
  battery_wear_cost_per_kwh:
    name: Battery Wear Cost
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: "Cent/kWh"
    icon: mdi:cash-minus

  # Hysteresis parameters
  battery_hold_threshold:
    name: Battery Hold Threshold
    min: 1
    max: 10
    step: 0.5
    unit_of_measurement: "%"
    icon: mdi:arrow-split-horizontal

  car_charging_hysteresis_minutes:
    name: Car Charging State Hysteresis
    min: 0
    max: 15
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-outline

  # Battery capacity for solar-to-SoC calculations
  battery_capacity_wh:
    name: Battery Capacity
    min: 1000
    max: 50000
    step: 100
    unit_of_measurement: "Wh"
    icon: mdi:battery-high

  night_consumption_rate_wh:
    name: Night Consumption Rate (22:00-wake)
    min: 50
    max: 600
    step: 10
    unit_of_measurement: "Wh/h"
    icon: mdi:sleep

  day_consumption_rate_wh:
    name: Day Consumption Rate (wake-22:00)
    min: 200
    max: 2000
    step: 10
    unit_of_measurement: "Wh/h"
    icon: mdi:run

  weekday_wake_hour:
    name: Weekday Wake Hour
    min: 0
    max: 12
    step: 0.5
    unit_of_measurement: "h"
    icon: mdi:alarm

  weekend_wake_hour:
    name: Weekend Wake Hour
    min: 0
    max: 12
    step: 0.5
    unit_of_measurement: "h"
    icon: mdi:alarm-snooze

  sleep_hour:
    name: Sleep Hour (High→Low Consumption)
    min: 18
    max: 24
    step: 0.5
    unit_of_measurement: "h"
    icon: mdi:power-sleep

  # Low solar threshold for winter mode detection
  low_solar_threshold_wh:
    name: Low Solar Forecast Threshold
    min: 500
    max: 10000
    step: 500
    unit_of_measurement: "Wh"
    icon: mdi:weather-sunny-off

sensor:

  - platform: rest
    name: "Tibber Energy Prices"
    resource: https://api.tibber.com/v1-beta/gql
    method: POST
    payload: '{ "query": "{ viewer { homes { currentSubscription { priceInfo(resolution: QUARTER_HOURLY) { current { total startsAt } today { total startsAt } tomorrow { total startsAt } } } } } }" }'
    json_attributes_path: "$.data.viewer.homes[0].currentSubscription.priceInfo"
    json_attributes:
      - today
      - tomorrow
    value_template: "{{ value_json.data.viewer.homes[0].currentSubscription.priceInfo.current.total | float }}"
    # Prices change every 15 min — 5 min polling is plenty (was 30s = 2880 calls/day)
    scan_interval: 300
    headers:
      Authorization: !secret tibber_api_key
      Content-Type: application/json
      User-Agent: REST
    unit_of_measurement: EUR/kWh
  # Riemann Sum Integral Sensors for Energy Dashboard
  - platform: integration
    source: sensor.grid_import_power
    name: grid_import_energy
    unit_prefix: k
    round: 2
    method: left
  - platform: integration
    source: sensor.grid_export_power
    name: grid_export_energy
    unit_prefix: k
    round: 2
    method: left
  - platform: integration
    source: sensor.total_solar_power
    name: solar_energy
    unit_prefix: k
    round: 2
    method: left
  - platform: integration
    source: sensor.battery_charge_power
    name: battery_charge_energy
    unit_prefix: k
    round: 2
    method: left
  - platform: integration
    source: sensor.battery_discharge_power
    name: battery_discharge_energy
    unit_prefix: k
    round: 2
    method: left

# Structured algorithm logging (using command_line integration)
command_line:
  - notify:
      name: battery_log
      command: "sh -c 'cat >> /config/battery_algorithm.log; echo >> /config/battery_algorithm.log'"

# Keep the algorithm log bounded (called monthly by automation)
shell_command:
  rotate_battery_log: "sh -c 'tail -n 20000 /config/battery_algorithm.log > /config/battery_algorithm.log.tmp && mv /config/battery_algorithm.log.tmp /config/battery_algorithm.log'"

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
modbus: !include modbus.yaml
template: !include templates.yaml
